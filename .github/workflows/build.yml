name: Build Albion Crafting Master Pro

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --add-data "logo1.png;." --add-data "logo2.png;." --collect-all customtkinter --name "CraftingMasterPro-Win" main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-22.04' # SUDAH DIPERBAIKI
        run: |
          pyinstaller --noconsole --onefile --add-data "logo1.png:." --add-data "logo2.png:." --collect-all customtkinter --name "CraftingMasterPro-Linux" main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            executable-windows-latest/*
            executable-ubuntu-22.04/* # SESUAIKAN DENGAN NAMA ARTIFACT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
